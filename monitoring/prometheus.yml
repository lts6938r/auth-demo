global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: 'server'
    static_configs:
      - targets: ['192.168.126.133:9100']

  - job_name: 'blockchain'
    static_configs:
      - targets: ['192.168.126.131:9100']

  - job_name: 'hyperledger_fabric_orderer'
    metrics_path: /metrics
    static_configs:
      - targets: ['192.168.126.131:9443']  # 将 orderer.example.com 替换为宿主机IP

  - job_name: 'hyperledger_fabric_peer_org1'
    metrics_path: /metrics
    static_configs:
      - targets: ['192.168.126.131:9444'] # 将 peer0.org1.example.com 替换为宿主机IP

  - job_name: 'hyperledger_fabric_peer_org2'
    metrics_path: /metrics
    static_configs:
      - targets: ['192.168.126.131:9445'] # 将 peer0.org2.example.com 替换为宿主机IP
